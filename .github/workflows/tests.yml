name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

permissions:
  contents: read

jobs:

  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v18
    with:
      cli-test-cmd: tsinfer --help

  test-c:
    name: C tests
    # secrets: inherit is required: this trusted first-party tskit-dev reusable
    # workflow reads secrets.CODECOV_TOKEN without declaring it in workflow_call.
    uses: tskit-dev/.github/.github/workflows/c-tests.yml@v17  # zizmor: ignore[secrets-inherit]
    with:
      library-directory: lib
    secrets: inherit

  test-python-c:
    name: Python-C tests
    # secrets: inherit is required: this trusted first-party tskit-dev reusable
    # workflow reads secrets.CODECOV_TOKEN without declaring it in workflow_call.
    uses: tskit-dev/.github/.github/workflows/python-c-tests.yml@v17  # zizmor: ignore[secrets-inherit]
    secrets: inherit

  test:
    name: Python
    # secrets: inherit is required: this trusted first-party tskit-dev reusable
    # workflow reads secrets.CODECOV_TOKEN without declaring it in workflow_call.
    uses: tskit-dev/.github/.github/workflows/python-tests.yml@v17  # zizmor: ignore[secrets-inherit]
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python }}
      coverage-directory: tsinfer
      fix-lwt-symlink: "true"
    secrets: inherit
    strategy:
      matrix:
        python: [ 3.11, 3.13 ]
        os:  [ macos-latest, ubuntu-24.04, windows-latest ]
